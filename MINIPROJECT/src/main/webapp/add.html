<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Ride - SafarMate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* ROOT */
:root{
  --bg:#0b0f1a;
  --purple:#7c3aed;
  --pink:#ff4ecd;
  --text:#cbd5f5;
}

body{
  margin:0;
  font-family:Poppins;
  background:var(--bg);
  color:#fff;
}

/* HEADER NAV */
header{
  display:flex;
  justify-content:space-between;
  padding:16px 6%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}
.logo img{height:45px;}
.logo span{
  font-family:Playfair Display;
  font-size:26px;
  background:linear-gradient(90deg,var(--pink),var(--purple));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

nav{
  display:flex;
  gap:20px;
  align-items:center;
}
nav a{
  color:#ddd;
  text-decoration:none;
}
nav a:hover{
  color:#fff;
}

/* 🔥 NEW HEADER */
.custom-header{
  width:100%;
  padding:60px 20px;
  text-align:center;

  background:
  linear-gradient(135deg, rgba(11,15,26,0.95), rgba(124,58,237,0.4));

  border-bottom:1px solid rgba(255,255,255,0.08);
}

.custom-header h1{
  font-family:Playfair Display;
  font-size:46px;
  margin:0;

  background:linear-gradient(90deg,#ff4ecd,#7c3aed);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.custom-header p{
  margin-top:12px;
  font-size:16px;
  color:#cbd5f5;
}

/* FORM CARD */
.form-card{
  max-width:600px;
  margin:40px auto 80px;
  background:rgba(255,255,255,0.04);
  padding:25px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.08);
}

/* INPUT */
.input-group{
  display:flex;
  align-items:center;
  margin-bottom:15px;
  background:rgba(0,0,0,0.4);
  border-radius:10px;
  padding:10px;
}

.input-group i{
  margin-right:10px;
  color:var(--pink);
}

input{
  width:100%;
  border:none;
  background:transparent;
  color:white;
  outline:none;
}

input::placeholder{
  color:#aaa;
}

/* BUTTON */
.btn-primary{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,var(--pink),var(--purple));
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}

/* BACK */
.back{
  display:block;
  width:fit-content;
  margin:20px auto;
  color:#aaa;
  text-decoration:none;
}
.back:hover{color:#fff;}

</style>
</head>

<body>

<!-- NAVBAR -->
<header>
<div class="logo">
<img src="logo.png">
<span>SafarMate</span>
</div>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="add.html">Add Ride</a>
<a href="myride.html">My Rides</a>
<a href="match2.html">Matches</a>
</nav>
</header>

<!-- 🔥 NEW HEADER -->
<div class="custom-header">
<h1>Add New Ride</h1>
<p>Share your ride with others</p>
</div>

<a href="index.html" class="back">⬅ Back to Home</a>

<!-- FORM -->
<div class="form-card">

<form action="AddRideServlet" method="post">

<div class="input-group">
<i class="bi bi-geo-alt-fill"></i>
<input type="text" name="source" placeholder="Source location" required>
</div>

<div class="input-group">
<i class="bi bi-geo-alt-fill"></i>
<input type="text" name="destination" placeholder="Destination" required>
</div>

<div class="input-group">
<i class="bi bi-signpost-2-fill"></i>
<input type="number" name="distance" placeholder="Distance (km)" required>
</div>

<div class="input-group">
<i class="bi bi-clock-fill"></i>
<input type="number" name="time" placeholder="Time (minutes)" required>
</div>

<div class="input-group">
<i class="bi bi-currency-rupee"></i>
<input type="number" name="fare" placeholder="Fare ₹" required>
</div>

<div class="input-group">
<i class="bi bi-person-fill"></i>
<input type="number" name="seats" placeholder="Seats available" required>
</div>

<div class="input-group">
<i class="bi bi-person-circle"></i>
<input type="text" name="driver" placeholder="Driver name">
</div>

<button type="submit" class="btn-primary">
 Add Ride
</button>

</form>

</div>

</body>
</html>
