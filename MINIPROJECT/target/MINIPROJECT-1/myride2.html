<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Rides - RideSync</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Background */
body {
    background: linear-gradient(135deg,#020617,#0f172a);
    font-family: 'Poppins', sans-serif;
}

/* Container */
.container-box {
    max-width: 1200px;
    margin: 40px auto;
}

/* Glass Card */
.glass {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 20px;
    color: white;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 20px;
    transition: 0.3s;
}

.glass:hover {
    transform: scale(1.02);
    box-shadow: 0 0 25px rgba(56,189,248,0.6);
}

/* Title */
h2 {
    background: linear-gradient(90deg,#38bdf8,#a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Text */
p {
    margin: 3px 0;
}

/* Buttons */
.btn-danger {
    background: #ef4444;
    border: none;
}

.btn-success {
    background: #22c55e;
    border: none;
}

.btn-warning {
    background: #facc15;
    border: none;
    color: black;
}

/* Back Button */
.back-btn {
    margin-bottom: 15px;
}

</style>
</head>

<body>

<div class="container-box">

<!-- Back -->
<a href="index.html" class="btn btn-outline-light back-btn">⬅ Back</a>

<h2 class="mb-2">🚗 My Rides</h2>
<p class="text-info mb-4">You have 2 active rides</p>

<!-- CARD 1 -->
<div class="glass">
<div class="d-flex justify-content-between">
<h5>Chandigarh → Mohali</h5>
<span class="badge bg-success">Active</span>
</div>

<p>📍 Pickup: Sector 17</p>
<p>📍 Drop: Phase 7</p>
<p>🛣 Distance: 12 km</p>
<p>⏱ Time: 25 mins</p>
<p>💰 Fare: ₹120</p>
<p>💺 Seats: 2</p>

<div class="mt-3 d-flex gap-2">
<button class="btn btn-success btn-sm">🔍 Match</button>
<button class="btn btn-warning btn-sm">✏ Edit</button>
<button class="btn btn-danger btn-sm">🗑 Delete</button>
</div>
</div>

<!-- CARD 2 -->
<div class="glass">
<div class="d-flex justify-content-between">
<h5>Mohali → Kharar</h5>
<span class="badge bg-warning text-dark">Pending</span>
</div>

<p>📍 Pickup: Phase 5</p>
<p>📍 Drop: Kharar</p>
<p>🛣 Distance: 18 km</p>
<p>⏱ Time: 35 mins</p>
<p>💰 Fare: ₹160</p>
<p>💺 Seats: 3</p>

<div class="mt-3 d-flex gap-2">
<button class="btn btn-success btn-sm">🔍 Match</button>
<button class="btn btn-warning btn-sm">✏ Edit</button>
<button class="btn btn-danger btn-sm">🗑 Delete</button>
</div>
</div>

<!-- EMPTY STATE (HIDDEN NOW, USE LATER) -->
<!--
<p class="text-muted text-center mt-5">
No rides found. Add a ride to get started 🚀
</p>
-->

</div>

</body>
</html>
