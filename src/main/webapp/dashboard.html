<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - SafarMate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>

/* ROOT */
:root{
  --bg:#0b0f1a;
  --purple:#7c3aed;
  --pink:#ff4ecd;
  --text:#cbd5f5;
}

body{
  margin:0;
  font-family:Poppins;
  background:var(--bg);
  color:#fff;
}

/* NAVBAR */
header{
  display:flex;
  justify-content:space-between;
  padding:16px 6%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}
.logo span{
  font-family:Playfair Display;
  font-size:26px;
  background:linear-gradient(90deg,var(--pink),var(--purple));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

nav{
  display:flex;
  gap:20px;
}
nav a{
  color:#ddd;
  text-decoration:none;
}
nav a:hover{color:#fff;}

/* HEADER TITLE */
.dashboard-header{
  padding:50px 6% 20px;
}

.dashboard-header h1{
  font-family:Playfair Display;
  font-size:36px;
  margin:0;
}

.dashboard-header p{
  color:var(--text);
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px 6%;
}

.stat-card{
  background:rgba(255,255,255,0.04);
  padding:20px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.08);
  transition:.3s;
}

.stat-card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 20px rgba(255,78,205,0.2);
}

.stat-card h3{
  margin:0;
  font-size:26px;
  color:#fff;
}

.stat-card p{
  color:#aaa;
}

/* ACTION */
.action{
  padding:20px 6%;
}

.action button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;

  background:linear-gradient(90deg,var(--pink),var(--purple));
  color:white;
  cursor:pointer;
}

/* SECTION HEADER */
.section-header{
  width:100%;
  margin:40px 0 20px;
  padding:16px 6%;

  display:flex;
  align-items:center;
  gap:15px;

  background:linear-gradient(
    90deg,
    rgba(255,78,205,0.10),
    rgba(124,58,237,0.10)
  );

  border-top:1px solid rgba(255,255,255,0.08);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.section-header::before{
  content:"";
  width:4px;
  height:32px;
  background:linear-gradient(#ff4ecd,#7c3aed);
}

.section-header h2{
  font-size:28px;
  color:white;
  margin:0;
}

/* RIDES GRID */
.rides-grid{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:20px 6% 80px;
}

/* CARD */
.ride-card{
  background:rgba(255,255,255,0.04);
  padding:20px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.08);
  transition:.3s;
}

.ride-card:hover{
  transform:translateY(-6px);
  box-shadow:0 0 20px rgba(255,78,205,0.2);
}

.ride-route{
  font-weight:600;
  margin-bottom:8px;
}

.ride-info{
  font-size:14px;
  color:var(--text);
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  opacity:0.6;
}

</style>
</head>

<body>

<!-- NAV -->
<header>
<div class="logo">
<span>SafarMate</span>
</div>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="addride.html">Add Ride</a>
<a href="myride.html">My Rides</a>
<a href="match2.html">Matches</a>
</nav>
</header>

<!-- HEADER -->
<div class="dashboard-header">
<h1>Dashboard</h1>
<p>Welcome back 👋 Manage your rides easily</p>
</div>

<!-- STATS -->
<div class="stats">

<div class="stat-card">
<p>Total Rides</p>
<h3>24</h3>
</div>

<div class="stat-card">
<p>Matches Found</p>
<h3>12</h3>
</div>

<div class="stat-card">
<p>Money Saved</p>
<h3>₹850</h3>
</div>

</div>

<!-- ACTION -->
<div class="action">
<button onclick="window.location.href='match2.html'">
🚀 Find Best Ride Match
</button>
</div>

<!-- RECENT RIDES -->
<div class="section-header">
<h2>Recent Rides</h2>
</div>

<div class="rides-grid" id="recent-rides"></div>

<!-- FOOTER -->
<footer>
© 2026 SafarMate
</footer>

<script>

async function loadRecentRides() {

    try {
        let res = await fetch("http://localhost:8080/MINIPROJECT/ViewRidesServlet");
        let data = await res.json();

        let container = document.getElementById("recent-rides");
        container.innerHTML = "";

        data.slice(0,3).forEach((ride) => {

            container.innerHTML += `
            <div class="ride-card">
                <div class="ride-route">${ride.source} → ${ride.destination}</div>
                <div class="ride-info">Driver: ${ride.driver}</div>
                <div class="ride-info">₹${ride.fare}</div>
                <div class="ride-info">${ride.seats} seats</div>
            </div>`;
        });

    } catch (error) {
        console.log(error);
    }
}

window.onload = loadRecentRides;

</script>

</body>
</html>
