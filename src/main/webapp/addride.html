<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Ride - RideSync</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Background */
body {
    background: linear-gradient(135deg,#020617,#0f172a);
    font-family: 'Poppins', sans-serif;
}

/* Container */
.container-box {
    max-width: 600px;
    margin: 60px auto;
}

/* Glass Card */
.glass {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 30px;
    color: white;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    animation: fadeIn 0.6s ease;
}

/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

/* Inputs */
input {
    background: rgba(255,255,255,0.1) !important;
    border: 1px solid rgba(255,255,255,0.2) !important;
    color: white !important;
}

/* Placeholder */

input::placeholder {
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.5px;
}

input:focus::placeholder {
    color: rgba(255,255,255,0.4);
}

/* Focus */
input:focus {
    outline: none;
    border: 1px solid #38bdf8 !important;
    box-shadow: 0 0 10px rgba(56,189,248,0.6);
}

/* Input Group */
.input-group-text {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
}

/* Button */
.btn-primary {
    background: linear-gradient(90deg,#38bdf8,#a78bfa);
    border: none;
}

/* Title */
h2 {
    background: linear-gradient(90deg,#38bdf8,#a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Label */
label {
    font-size: 14px;
    margin-bottom: 5px;
}

/* Back Button */
.back-btn {
    margin-bottom: 15px;
}

</style>
</head>

<body>

<div class="container-box">

<!-- Back Button -->
<a href="index.html" class="btn btn-outline-light back-btn">⬅ Back</a>

<div class="glass">

<h2 class="text-center mb-4">🚗 Add New Ride</h2>

<form action="AddRideServlet" method="post">

<!-- Source -->
<label>Source</label>
<div class="input-group mb-3">
  <span class="input-group-text">📍</span>
  <input type="text" name="source" class="form-control" placeholder="Enter source location" required>
</div>

<!-- Destination -->
<label>Destination</label>
<div class="input-group mb-3">
  <span class="input-group-text">📍</span>
  <input type="text" name="destination" class="form-control" placeholder="Enter destination" required>
</div>

<!-- Distance -->
<label>Distance (km)</label>
<div class="input-group mb-3">
  <span class="input-group-text">🛣</span>
  <input type="number" name="distance" class="form-control" placeholder="e.g. 12" required>
</div>

<!-- Time -->
<label>Time (minutes)</label>
<div class="input-group mb-3">
  <span class="input-group-text">⏱</span>
  <input type="number" name="time" class="form-control" placeholder="e.g. 25" required>
</div>

<!-- Fare -->
<label>Fare (₹)</label>
<div class="input-group mb-3">
  <span class="input-group-text">💰</span>
  <input type="number" name="fare" class="form-control" placeholder="e.g. 120" required>
</div>

<!-- Seats -->
<label>Available Seats</label>
<div class="input-group mb-3">
  <span class="input-group-text">💺</span>
  <input type="number" name="seats" class="form-control" placeholder="e.g. 2" required>
</div>

<!-- Driver -->
<label>Driver Name</label>
<div class="input-group mb-3">
  <span class="input-group-text">👤</span>
  <input type="text" name="driver" class="form-control" placeholder="Driver name">
</div>

<!-- Submit -->
<button type="submit" class="btn btn-primary w-100 mt-3">
🚀 Add Ride
</button>

</form>

</div>

</div>

</body>
</html>
