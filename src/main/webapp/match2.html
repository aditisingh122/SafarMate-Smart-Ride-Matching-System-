<body>

<header>

<img src="logo.png">
<span>SafarMate</span>

<div class="custom-header">
<h1>Ride Matches</h1>
<p>Find best rides using smart algorithm</p>
</div>

<a href="index.html" class="back">⬅ Back</a>

<div class="search-card">
<div class="search-row">
<input id="from" placeholder="Source">
<input id="to" placeholder="Destination">
<button class="search-btn" onclick="searchRide()">Search</button>
</div>
</div>

<div class="rides-grid" id="result"></div>

<script>

function searchRide() {

    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    if(!from || !to){
        alert("Enter both fields");
        return;
    }

    fetch(`http://localhost:8080/MINIPROJECT/MatchServlet?from=${from}&to=${to}`)
        .then(res => res.json())
        .then(data => displayRides(data))
        .catch(() => alert("Server error"));
}

function displayRides(rides) {

    let container = document.getElementById("result");
    container.innerHTML = "";

    if(rides.length === 0){
        container.innerHTML = "<p style='text-align:center'>No rides found 🚫</p>";
        return;
    }

    rides.forEach((r, index) => {

        let bestClass = index === 0 ? "ride-card best" : "ride-card";

        let seatText = r.seats > 0 
            ? `${r.seats} seats available` 
            : "No seats available";

        let seatColor = r.seats > 0 ? "#22c55e" : "#ef4444";
        let disabled = r.seats === 0 ? "disabled" : "";

        container.innerHTML += `
        <div class="${bestClass}">

            <div><b>${r.from} → ${r.to}</b></div>

            <div class="ride-info">👤 ${r.driver}</div>
            <div class="ride-info">💰 ₹${r.fare}</div>
            <div class="ride-info">🛣 ${r.distance} km</div>

            <div class="ride-info" style="color:${seatColor}">
                👥 ${seatText}
            </div>

            <div class="ride-info">⭐ Score: ${r.score}%</div>

            <button class="join-btn" ${disabled} onclick="joinRide(${r.id})">
                ${r.seats > 0 ? "🚗 Join Ride" : "Full"}
            </button>

        </div>`;
    });
}

function joinRide(id){

    let user = prompt("Enter your name:");
    if(!user) return;

    fetch("http://localhost:8080/MINIPROJECT/JoinRideServlet", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "id=" + id + "&user=" + encodeURIComponent(user)
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        if(data.status === "success"){
            location.reload();
        }
    })
    .catch(() => alert("Error joining ride"));
}

</script>

</body>
